stages:
  - deploy

deploy_to_test:
  stage: deploy
  image: alpine:latest # Use a lightweight image

  before_script:
    - "command -v ssh-agent >/dev/null || ( apk add --update openssh-client )"
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $TEST_SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

  script:
    - echo "Deploying to test server..."
    # Copy the .env file from the GitLab variable to the server
    - ssh ${TEST_SERVER_USER}@${TEST_SERVER_IP} "echo '${ENV_FILE_CONTENT}' > /var/www/smartdorm/smartdormv2-backend-development/.env"
    # Execute the deployment script on the server
    - ssh ${TEST_SERVER_USER}@${TEST_SERVER_IP} "bash /var/www/smartdorm/deploy.sh"

  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
