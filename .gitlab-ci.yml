stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  TEST_TYPE: "unit"

cache:
  paths:
    - .cache/pip/
    - venv/

before_script:
  - sudo apt update
  - sudo apt install -y libldap2-dev libsasl2-dev libssl-dev build-essential python3-dev
  - python3 -m venv venv
  - source venv/bin/activate
  - pip install -r requirements.txt

test:
  stage: test
  tags:
    - shell
  script:
    - source venv/bin/activate
    - ./run-server.sh
  only:
    - merge_requests
    - main