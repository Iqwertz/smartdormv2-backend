stages:
  - deploy

.deploy_template: &deploy_definition
  image: alpine:latest
  before_script:
    - "command -v ssh-agent >/dev/null || ( apk add --update openssh-client )"
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - echo "Deploying to ${CI_ENVIRONMENT_NAME} server..."
    # Copy the correct .env file to the server
    - ssh ${SERVER_USER}@${SERVER_IP} "echo '${ENV_FILE_CONTENT}' > /var/www/smartdorm/smartdormv2-backend/.env"
    # Execute the deployment script, passing the branch name as an argument
    - ssh ${SERVER_USER}@${SERVER_IP} "bash /var/www/smartdorm/smartdormv2-backend/deploy.sh ${CI_COMMIT_REF_NAME}"

deploy_to_development:
  stage: deploy
  environment:
    name: development
  <<: *deploy_definition
  rules:
    - if: '$CI_COMMIT_BRANCH == "development"'

deploy_to_production:
  stage: deploy
  environment:
    name: production
  <<: *deploy_definition
  when: manual # Prevents accidental deployments to production.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main" && $CI_MERGE_REQUEST_STATE == "merged"'
