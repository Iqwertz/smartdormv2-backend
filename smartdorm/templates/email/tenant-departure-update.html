<!DOCTYPE html>
<html
>
<head>
    <meta name="format-detection" content="address=no">
    <meta name="format-detection" content="date=no">
    <meta name="format-detection" content="email=no">
    <meta name="format-detection" content="telephone=no">

    <meta http-equiv="Content-Type" content="text/html" charset="UTF-8" />
    <!--[if !mso]><!-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!--<![endif]-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--[if gte mso 9]><xml>
        <o:OfficeDocumentSettings>
            <o:AllowPNG/>
            <o:PixelsPerInch>96</o:PixelsPerInch>
        </o:OfficeDocumentSettings>
    </xml><![endif]-->

    <!--
        <style type="text/css"></style>
        -->
    <style>
        a:hover {
            cursor:pointer!important;
        }
        @media screen and (max-width: 600px) {
            .newsletter-main-text table.button-tbl {
                margin: 0 auto 0 auto !important;
                width: 100% !important;
            }
        }
    </style>
    <!--<style type="text/css"></style>-->


    <!--[if (gte mso 9)|(IE)]>
    <style type="text/css">
        table {border-collapse: collapse !important;}
    </style>
    <![endif]-->

</head>
<body class="light-gray-background" style="margin:0 auto !important;padding: 0;mso-padding-alt:0;min-width:100%;background-color:#e2e2e2;" >
<table style="width:100%;border-collapse:collapse;border-spacing:0;font-family:Verdana, sans-serif;margin:0;padding:0;">
    <tbody>
        <td class="light-gray-background" style="border-collapse:collapse;border-spacing:0;font-family:Verdana, sans-serif;margin: 0;padding: 0;background-color:#e2e2e2;">
            <div class="wrapper light-gray-background" style="background-color:#e2e2e2;width:100%;table-layout:fixed;text-align:center;">
                <div class="webkit" style="max-width:600px;margin:0 auto;">
                    <table class="outer" style="border-collapse:collapse;border-spacing:0;font-family:Verdana, sans-serif;padding: 0;margin: 0 auto;width:100%;max-width:600px;">
                        <tbody>
                        <tr class="row header" style="max-width:600px;background-color:#80162c;">
                            <td class="one-column nl-padding" style="max-width:600px;border-collapse:collapse;border-spacing:0;font-family:Verdana, sans-serif;mso-table-lspace:0;mso-table-rspace:0;margin: 0;mso-cellspacing:0;padding: 0 24px;mso-padding-alt:0 24px 0 24px;">
                                <table id="header" style="width:100%;border-collapse:collapse;border-spacing:0;font-family:Verdana, sans-serif;mso-table-lspace:0;mso-table-rspace:0;margin: 0;padding: 0;mso-padding-alt:0;mso-cellspacing:0;">
                                    <tr>
                                        <td style="border-collapse:collapse;border-spacing:0;font-family:Verdana, sans-serif;mso-table-lspace:0;mso-table-rspace:0;margin: 0;padding: 0;mso-padding-alt:0;mso-cellspacing:0;height:81px;text-align:left;">
                                            <img src="https://www.schollheim.net/wp-content/uploads/2019/11/logo_3_header_wei_transparent-e1573046761526-414x75.png" alt="" height="40" class="logo" style="border-width:0;Margin:18px auto 18px 0;" />
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                        <tr class="row newsletter-main-text">
                            <td class="one-column" style="border-collapse:collapse;border-spacing:0;font-family:Verdana, sans-serif;margin: 0;padding: 0;">
                                <table class="white-background text-table min-height" style="width:100%;border-collapse:collapse;border-spacing:0;font-family:Verdana, sans-serif;background-color:#fff;width:100%;max-width:600px;margin: 0;padding: 0;min-height:158px;">
                                    <tbody>
                                    <tr>
                                        <td class="inner contents" style="border-collapse:collapse;margin: 0;vertical-align:top;text-align:left;padding: 24px;border-spacing:0;font-family:Verdana, sans-serif;">
                                            <p style="font-family:Verdana, sans-serif;font-size:15px;font-weight:bold;line-height:18px;margin: 0 0 16px;color:#2d2d2d;padding-bottom:12px;">Hallo {{greeting}},</p>

                                            <p style="margin:0;font-family:Verdana, sans-serif;font-size:13px;line-height:18px;color:#797878;padding-bottom:12px;"><strong>{{departmentName}}</strong> bestätigt, dass Du schuldenfrei bist.</p>

                                            <p style="margin:0;font-family:Verdana, sans-serif;font-size:13px;line-height:18px;color:#797878;padding-bottom:17px;">Bitte antworte nicht auf diese Mail, da sie von einer automatischen Mailbox versendet wurde.</p>
                                            <p style="margin:0;font-family:Verdana, sans-serif;font-size:13px;line-height:18px;color:#797878;padding-bottom:2px;">Viele Grüße,</p>
                                            <p style="margin:0;font-family:Verdana, sans-serif;font-size:13px;line-height:18px;color:#797878;padding-bottom:8px;">Dein Netzwerkreferat</p>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </td>
                        </tr>
                        <tr class="row banner">
                            <td class="full-width-image" style="border-collapse:collapse;border-spacing:0;margin: 0;padding: 0;"><img alt="" src="https://www.schollheim.net/wp-content/uploads/2019/03/bhnenbild_bewohner-1024x768.jpg" style="width:100%;border-width:0;max-width:600px;height:auto!important;display:block;"/></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
